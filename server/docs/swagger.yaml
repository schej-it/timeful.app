definitions:
  bson.M:
    additionalProperties: true
    type: object
  calendar.CalendarEventsWithError:
    properties:
      calendarEvents:
        items:
          $ref: '#/definitions/models.CalendarEvent'
        type: array
      error: {}
    type: object
  commands.Response:
    properties:
      blocks:
        items:
          $ref: '#/definitions/bson.M'
        type: array
      response_type:
        description: ephemeral or in_channel
        type: string
      text:
        type: string
    type: object
  models.AppleCalendarAuth:
    type: object
  models.Attendee:
    properties:
      _id:
        type: string
      declined:
        type: boolean
      email:
        type: string
      eventId:
        type: string
    type: object
  models.BufferTimeOptions:
    properties:
      enabled:
        type: boolean
      time:
        type: integer
    type: object
  models.CalendarAccount:
    properties:
      appleCalendarAuth:
        $ref: '#/definitions/models.AppleCalendarAuth'
      calendarType:
        $ref: '#/definitions/models.CalendarType'
      email:
        description: Email is required for all calendar accounts
        type: string
      enabled:
        type: boolean
      icsCalendarAuth:
        $ref: '#/definitions/models.ICSCalendarAuth'
      oAuth2CalendarAuth:
        $ref: '#/definitions/models.OAuth2CalendarAuth'
      picture:
        type: string
      subCalendars:
        additionalProperties:
          $ref: '#/definitions/models.SubCalendar'
        type: object
    type: object
  models.CalendarEvent:
    properties:
      allDay:
        description: Whether the event is an all day event
        type: boolean
      calendarId:
        type: string
      endDate:
        type: integer
      free:
        description: Whether the user is free during this event
        type: boolean
      id:
        type: string
      startDate:
        type: integer
      summary:
        type: string
    type: object
  models.CalendarOptions:
    properties:
      bufferTime:
        $ref: '#/definitions/models.BufferTimeOptions'
      workingHours:
        $ref: '#/definitions/models.WorkingHoursOptions'
    type: object
  models.CalendarType:
    enum:
    - apple
    - google
    - outlook
    - ics
    type: string
    x-enum-varnames:
    - AppleCalendarType
    - GoogleCalendarType
    - OutlookCalendarType
    - ICSCalendarType
  models.Event:
    properties:
      _id:
        type: string
      activeSlots:
        items:
          type: integer
        type: array
      attendees:
        description: Attendees for an availability group (fetched from Attendees collection)
        items:
          $ref: '#/definitions/models.Attendee'
        type: array
      blindAvailabilityEnabled:
        description: Whether to enable blind availability
        type: boolean
      calendarEventId:
        type: string
      collectEmails:
        type: boolean
      creatorPosthogId:
        description: PostHog ID for the event creator
        type: string
      dates:
        items:
          type: integer
        type: array
      daysOnly:
        description: Whether to only poll for days, not times
        type: boolean
      description:
        type: string
      duration:
        type: number
      enabledSlots:
        items:
          type: integer
        type: array
      eventTimezone:
        type: string
      hasResponded:
        description: Whether the user has responded to the availability group (fetched
          based on whether user is in Attendees)
        type: boolean
      hasSpecificTimes:
        description: Used for specific times for specific dates feature
        type: boolean
      isArchived:
        type: boolean
      isDeleted:
        type: boolean
      isSignUpForm:
        description: Sign up form details
        type: boolean
      name:
        type: string
      notificationsEnabled:
        type: boolean
      numResponses:
        description: Used to store the number of responses for the event
        type: integer
      ownerId:
        type: string
      remindees:
        description: Remindees
        items:
          $ref: '#/definitions/models.Remindee'
        type: array
      responses:
        additionalProperties:
          $ref: '#/definitions/models.Response'
        description: Availability responses - old format for backward compatibility
          (fetched from eventResponses collection)
        type: object
      scheduledEvent:
        allOf:
        - $ref: '#/definitions/models.CalendarEvent'
        description: Scheduled event
      sendEmailAfterXResponses:
        type: integer
      shortId:
        type: string
      signUpBlocks:
        items:
          $ref: '#/definitions/models.SignUpBlock'
        type: array
      signUpResponses:
        additionalProperties:
          $ref: '#/definitions/models.SignUpResponse'
        type: object
      slotGeneration:
        $ref: '#/definitions/models.SlotGeneration'
      startOnMonday:
        description: Whether to start the event on Monday (as opposed to Sunday, used
          for DOW events)
        type: boolean
      timeIncrement:
        type: integer
      timedRecurrence:
        $ref: '#/definitions/models.TimedRecurrence'
      times:
        items:
          type: integer
        type: array
      type:
        $ref: '#/definitions/models.EventType'
      when2meetHref:
        type: string
    type: object
  models.EventType:
    enum:
    - specific_dates
    - dow
    - group
    type: string
    x-enum-varnames:
    - SPECIFIC_DATES
    - DOW
    - GROUP
  models.Folder:
    properties:
      _id:
        type: string
      color:
        type: string
      eventIds:
        items:
          type: string
        type: array
      isDeleted:
        type: boolean
      name:
        type: string
      userId:
        type: string
    type: object
  models.ICSCalendarAuth:
    properties:
      label:
        type: string
    type: object
  models.Location:
    properties:
      city:
        type: string
      country_code:
        type: string
      country_name:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      postal:
        type: string
      state:
        type: string
    type: object
  models.OAuth2CalendarAuth:
    type: object
  models.Remindee:
    properties:
      email:
        type: string
      responded:
        type: boolean
    type: object
  models.Response:
    properties:
      availability:
        description: Availability
        items:
          type: integer
        type: array
      calendarOptions:
        $ref: '#/definitions/models.CalendarOptions'
      email:
        type: string
      enabledCalendars:
        additionalProperties:
          items:
            type: string
          type: array
        description: Maps email to an array of sub calendar ids
        type: object
      guestEditPolicy:
        type: string
      guestId:
        type: string
      guestOwnershipMode:
        type: string
      ifNeeded:
        items:
          type: integer
        type: array
      manualAvailability:
        additionalProperties:
          items:
            type: integer
          type: array
        description: Mapping from the start date of a day to the available times for
          that day
        type: object
      name:
        description: Guest information
        type: string
      useCalendarAvailability:
        description: Calendar availability variables for Availability Groups feature
        type: boolean
      user:
        $ref: '#/definitions/models.User'
      userId:
        description: User information
        type: string
    type: object
  models.SignUpBlock:
    properties:
      _id:
        type: string
      capacity:
        type: integer
      endDate:
        type: integer
      name:
        type: string
      startDate:
        type: integer
    type: object
  models.SignUpResponse:
    properties:
      email:
        type: string
      name:
        description: Guest information
        type: string
      signUpBlockIds:
        description: The IDs of the sign up blocks that the user has signed up for
        items:
          type: string
        type: array
      user:
        $ref: '#/definitions/models.User'
      userId:
        description: User information
        type: string
    type: object
  models.SlotGeneration:
    properties:
      endTimeLocal:
        type: string
      startTimeLocal:
        type: string
      timeIncrementMinutes:
        type: integer
    type: object
  models.SubCalendar:
    properties:
      enabled:
        type: boolean
      name:
        type: string
    type: object
  models.TimedRecurrence:
    properties:
      kind:
        type: string
      selectedDays:
        items:
          type: string
        type: array
      selectedDaysOfWeek:
        items:
          type: integer
        type: array
      startOnMonday:
        type: boolean
    type: object
  models.User:
    properties:
      _id:
        description: Profile info
        type: string
      calendarAccounts:
        additionalProperties:
          $ref: '#/definitions/models.CalendarAccount'
        description: |-
          CalendarAccounts is a mapping from {`email_CALENDARTYPE` => CalendarAccount} that contains all the
          additional accounts the user wants to see google calendar events for
        type: object
      calendarOptions:
        allOf:
        - $ref: '#/definitions/models.CalendarOptions'
        description: Calendar options
      email:
        type: string
      firstName:
        type: string
      hasCustomName:
        description: Whether the user has set a custom name for themselves, i.e. don't
          change their name when they sign in
        type: boolean
      isPremium:
        type: boolean
      lastName:
        type: string
      numEventsCreated:
        type: integer
      picture:
        type: string
      primaryAccountKey:
        description: The calendarAccountKey of the account the user first signed in
          with
        type: string
      stripeCustomerId:
        description: Stripe customer ID
        type: string
      timezoneOffset:
        type: integer
    type: object
  models.WorkingHoursOptions:
    properties:
      enabled:
        type: boolean
      endTime:
        type: number
      startTime:
        type: number
    type: object
  responses.Error:
    properties:
      error: {}
    required:
    - error
    type: object
  routes.CreateFolderResponse:
    properties:
      id:
        type: string
    type: object
host: localhost:3002/api
info:
  contact: {}
  description: This is the API for Schej.it!
  title: Schej.it API
  version: "1.0"
paths:
  /analytics/downgrade-user:
    post:
      consumes:
      - application/json
      parameters:
      - description: Object containing the user email
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Downgrades the specified user to Schej Free
      tags:
      - analytics
  /analytics/monthly-active-event-creators:
    get:
      consumes:
      - application/json
      parameters:
      - description: Start date (YYYY-MM-DD) for the range
        in: query
        name: startDate
        required: true
        type: string
      - description: End date (YYYY-MM-DD) for the range
        in: query
        name: endDate
        required: true
        type: string
      - description: Client's timezone offset in minutes from UTC (e.g., -420 for
          UTC-7)
        in: query
        name: timezoneOffset
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              properties:
                count:
                  type: integer
                date:
                  type: string
              type: object
            type: array
        "400":
          description: Invalid date format, range, or timezone offset
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Gets the daily count of monthly active event creators over a date range
      tags:
      - analytics
  /analytics/monthly-active-event-creators-with-more-than-x-events:
    get:
      consumes:
      - application/json
      parameters:
      - description: Start date (YYYY-MM-DD) for the range
        in: query
        name: startDate
        required: true
        type: string
      - description: End date (YYYY-MM-DD) for the range
        in: query
        name: endDate
        required: true
        type: string
      - description: Client's timezone offset in minutes from UTC (e.g., -420 for
          UTC-7)
        in: query
        name: timezoneOffset
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              properties:
                count:
                  type: integer
                date:
                  type: string
              type: object
            type: array
        "400":
          description: Invalid date format, range, or timezone offset
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Gets the daily count of monthly active event creators over a date range
        with more than x events
      tags:
      - analytics
  /analytics/scanned-poster:
    post:
      consumes:
      - application/json
      parameters:
      - description: Object containing the location that poster was scanned from and
          the url that was scanned
        in: body
        name: payload
        required: true
        schema:
          properties:
            location:
              $ref: '#/definitions/models.Location'
            url:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Notifies us when poster QR code has been scanned
      tags:
      - analytics
  /analytics/upgrade-dialog-viewed:
    post:
      consumes:
      - application/json
      parameters:
      - description: Object containing the user id
        in: body
        name: payload
        required: true
        schema:
          properties:
            userId:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Notifies us when user has viewed the upgrade dialog
      tags:
      - analytics
  /analytics/upgrade-user:
    post:
      consumes:
      - application/json
      parameters:
      - description: Object containing the user email
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Upgrades the specified user to Schej Premium
      tags:
      - analytics
  /analytics/user/{email}:
    get:
      consumes:
      - application/json
      parameters:
      - description: User email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
      summary: Gets the user by email
      tags:
      - analytics
  /auth/otp/check-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email to check
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Checks whether a user with the given email exists
      tags:
      - auth
  /auth/otp/send:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email to send OTP to
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Sends an OTP code to the given email
      tags:
      - auth
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email, OTP code, and timezone offset
        in: body
        name: payload
        required: true
        schema:
          properties:
            code:
              type: string
            email:
              type: string
            timezoneOffset:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Verifies an OTP code and signs the user in
      tags:
      - auth
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: Signs user in and sets the access token session variable
      parameters:
      - description: Object containing the Google authorization code, scope, calendar
          type, and the user's timezone offset
        in: body
        name: payload
        required: true
        schema:
          properties:
            calendarType:
              type: string
            code:
              type: string
            scope:
              type: string
            timezoneOffset:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Signs user in
      tags:
      - auth
  /auth/sign-in-mobile:
    post:
      consumes:
      - application/json
      description: Signs user in and sets the access token session variable
      parameters:
      - description: Object containing the Google authorization code, calendar type,
          and the user's timezone offset
        in: body
        name: payload
        required: true
        schema:
          properties:
            accessToken:
              type: string
            calendarType:
              type: string
            expiresIn:
              type: integer
            idToken:
              type: string
            refreshToken:
              type: string
            scope:
              type: string
            timezoneOffset:
              type: integer
            tokenOrigin:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Signs user in from mobile
      tags:
      - auth
  /auth/sign-out:
    post:
      consumes:
      - application/json
      description: Signs user out and deletes the session
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Signs user out
      tags:
      - auth
  /auth/status:
    get:
      description: Returns a 401 error if user is not signed in, 200 if they are
      responses:
        "200":
          description: OK
        "401":
          description: Error object
          schema:
            $ref: '#/definitions/responses.Error'
      summary: Gets whether the user is signed in or not
      tags:
      - auth
  /events:
    post:
      consumes:
      - application/json
      parameters:
      - description: Object containing info about the event to create
        in: body
        name: payload
        required: true
        schema:
          properties:
            activeSlots:
              items:
                type: string
              type: array
            attendees:
              items:
                type: string
              type: array
            blindAvailabilityEnabled:
              type: boolean
            dates:
              items:
                type: string
              type: array
            daysOnly:
              type: boolean
            duration:
              type: number
            enabledSlots:
              items:
                type: string
              type: array
            eventTimezone:
              type: string
            isSignUpForm:
              type: boolean
            name:
              type: string
            notificationsEnabled:
              type: boolean
            remindees:
              items:
                type: string
              type: array
            sendEmailAfterXResponses:
              type: integer
            signUpBlocks:
              items:
                $ref: '#/definitions/models.SignUpBlock'
              type: array
            slotGeneration:
              $ref: '#/definitions/models.SlotGeneration'
            timeIncrement:
              type: integer
            timedRecurrence:
              $ref: '#/definitions/models.TimedRecurrence'
            type:
              $ref: '#/definitions/models.EventType'
            when2meetHref:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              eventId:
                type: string
            type: object
      summary: Creates a new event
      tags:
      - events
  /events/{eventId}:
    delete:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Deletes an event based on its id
      tags:
      - events
    get:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Event'
      summary: Gets an event based on its id
      tags:
      - events
    put:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing info about the event to update
        in: body
        name: payload
        required: true
        schema:
          properties:
            activeSlots:
              items:
                type: string
              type: array
            attendees:
              items:
                type: string
              type: array
            blindAvailabilityEnabled:
              type: boolean
            dates:
              items:
                type: string
              type: array
            daysOnly:
              type: boolean
            description:
              type: string
            duration:
              type: number
            enabledSlots:
              items:
                type: string
              type: array
            eventTimezone:
              type: string
            name:
              type: string
            notificationsEnabled:
              type: boolean
            remindees:
              items:
                type: string
              type: array
            sendEmailAfterXResponses:
              type: integer
            signUpBlocks:
              items:
                $ref: '#/definitions/models.SignUpBlock'
              type: array
            slotGeneration:
              $ref: '#/definitions/models.SlotGeneration'
            timeIncrement:
              type: integer
            timedRecurrence:
              $ref: '#/definitions/models.TimedRecurrence'
            type:
              $ref: '#/definitions/models.EventType'
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Edits an event based on its id
      tags:
      - events
  /events/{eventId}/archive:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Archive status
        in: body
        name: payload
        required: true
        schema:
          properties:
            archive:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Archive an event
      tags:
      - events
  /events/{eventId}/calendar-availabilities:
    get:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Lower bound for event's start time to filter by
        in: query
        name: timeMin
        required: true
        type: string
      - description: Upper bound for event's end time to filter by
        in: query
        name: timeMax
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              additionalProperties:
                $ref: '#/definitions/calendar.CalendarEventsWithError'
              type: object
            type: object
      summary: Return a map mapping user id to their calendar events that they have
        enabled for the given time range
      tags:
      - events
  /events/{eventId}/decline:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Decline the current user's invite to the event
      tags:
      - events
  /events/{eventId}/duplicate:
    post:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing options for the duplicated event
        in: body
        name: payload
        required: true
        schema:
          properties:
            copyAvailability:
              type: boolean
            eventName:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Duplicate event
      tags:
      - events
  /events/{eventId}/ids:
    get:
      parameters:
      - description: Event shortId or longId
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              longId:
                type: string
              shortId:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.Error'
      summary: Resolves an event identifier to both short and long IDs
      tags:
      - events
  /events/{eventId}/rename-user:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing info about the guest response to rename
        in: body
