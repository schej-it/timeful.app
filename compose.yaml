name: timeful

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend-artifacts:
    build:
      context: ./frontend
      target: builder
      args:
        VITE_POSTHOG_API_KEY: ${VITE_POSTHOG_API_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${CLIENT_ID:-}
        VITE_MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
    volumes:
      - frontend_dist:/app/dist
    command:
      [
        "sh",
        "-c",
        "find /app/dist -mindepth 1 -maxdepth 1 -exec rm -rf {} + && cp -a /build/. /app/dist/ && test -f /app/dist/index.html && echo 'Frontend artifacts copied'",
      ]

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ./server/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      GIN_MODE: release
      FRONTEND_DIST: /app/frontend/dist
    volumes:
      - frontend_dist:/app/frontend/dist:ro
      - server_logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      frontend-artifacts:
        condition: service_completed_successfully
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend-artifacts:
        condition: service_completed_successfully
      server:
        condition: service_healthy

volumes:
  mongo_data:
  frontend_dist:
  server_logs:
  caddy_data:
  caddy_config:
