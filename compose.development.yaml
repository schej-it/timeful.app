services:
  server:
    ports: !override
      - "127.0.0.1:3002:3002"
    environment:
      CORS_ORIGINS: https://localhost,http://localhost:4173,http://localhost:4174,http://127.0.0.1:4173,http://127.0.0.1:4174
    volumes: !reset
      - server_logs:/app/logs
    depends_on: !reset
      mongo:
        condition: service_healthy
