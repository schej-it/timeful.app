# Example Nginx server block for the HOST machine.
# This proxies HTTPS traffic to the Timeful Docker container.
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/timeful
#   2. Replace YOUR_DOMAIN with your actual domain
#   3. Symlink: sudo ln -s /etc/nginx/sites-available/timeful /etc/nginx/sites-enabled/
#   4. Get SSL certs: sudo certbot --nginx -d YOUR_DOMAIN
#   5. Reload: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
