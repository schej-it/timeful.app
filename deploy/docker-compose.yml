services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_started
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    networks:
      - timeful

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - timeful

volumes:
  mongodb_data:

networks:
  timeful:
